<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saket</title>
    <style>
    body {
        background-color:#db97ae;
        font-family: Arial, sans-serif;
        padding: 20px;
    }
    h1 {
        color: rgb(0, 3, 3);
        text-align: center;
    }
    p {
        color:#8297c5
        font-size: 45px;
        line-height: 1.10;
    }
.my-btn {
    background-color: #439938; 
    color: rgb(255, 255, 255); 
    padding: 12px 24px; 
    font-size: 16px; 
    border: none; 
    border-radius: 5px; 
    cursor: pointer; 
    display: block; 
    margin: 20px auto;
    transition: 0.3s;
}

.my-btn:hover {
    background-color: #0056b3;
    transform: scale(1.05); 
}
/* Form Container Styling */
.form-container {
    background-color: white;
    max-width: 400px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
}

.form-container h2 {
    text-align: center;
    color: #333;
    font-size: 20px;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #555;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

.submit-btn {
    width: 100%;
    background-color: #28a745;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.submit-btn:hover {
    background-color: #d4d245;
}
</style>
</head>
<body>

        </div>
        
        <div class="form-group">
            <label for="email"> Email:</label>
            <input type="email" id="email" placeholder="Apna email dalein" required>

        <button type="submit" class="submit-btn"> send Message </button>

</div>
